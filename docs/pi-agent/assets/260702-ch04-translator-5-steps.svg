  <svg viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
      </marker>
      <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
      </marker>
    </defs>
    <rect width="960" height="600" fill="#faf7f2"/>

    <!-- Input -->
    <rect x="320" y="20" width="320" height="48" rx="6" fill="rgba(28,25,23,0.05)" stroke="rgba(28,25,23,0.30)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="480" y="42" fill="#1c1917" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">调用：streamFn(model, context, options)</text>
    <text x="480" y="58" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">来自第一层 stream()</text>

    <line x1="480" y1="68" x2="480" y2="96" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

    <!-- Step 1 -->
    <rect x="280" y="100" width="400" height="56" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
    <circle cx="304" cy="128" r="14" fill="rgba(181,82,58,0.10)" stroke="#b5523a" stroke-width="1"/>
    <text x="304" y="133" fill="#b5523a" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">1</text>
    <text x="328" y="120" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif">创建客户端</text>
    <text x="328" y="138" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">用 API Key 初始化 · 就像翻译员确认带了字典</text>
    <text x="328" y="150" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">new Anthropic(apiKey)</text>

    <line x1="480" y1="156" x2="480" y2="184" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

    <!-- Step 2 -->
    <rect x="280" y="188" width="400" height="72" rx="6" fill="rgba(181,82,58,0.06)" stroke="#b5523a" stroke-width="1.4"/>
    <circle cx="304" cy="224" r="14" fill="rgba(181,82,58,0.20)" stroke="#b5523a" stroke-width="1.4"/>
    <text x="304" y="229" fill="#b5523a" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">2</text>
    <text x="328" y="210" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif">构建请求参数 ★</text>
    <text x="328" y="228" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">统一格式 → Provider 私有格式</text>
    <text x="328" y="244" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">content → parts、cache_control 等</text>
    <text x="328" y="256" fill="#a8a29e" font-size="8" font-family="'Geist', sans-serif" font-style="italic">工作量主要在这里</text>

    <line x1="480" y1="260" x2="480" y2="288" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

    <!-- Step 3 -->
    <rect x="280" y="292" width="400" height="56" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
    <circle cx="304" cy="320" r="14" fill="rgba(181,82,58,0.10)" stroke="#b5523a" stroke-width="1"/>
    <text x="304" y="325" fill="#b5523a" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">3</text>
    <text x="328" y="312" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif">发送请求</text>
    <text x="328" y="330" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">通过 SDK 或直接 HTTP 发给模型 · 等待开始响应</text>
    <text x="328" y="342" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">client.create(...)</text>

    <line x1="480" y1="348" x2="480" y2="376" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

    <!-- Step 4 -->
    <rect x="280" y="380" width="400" height="72" rx="6" fill="rgba(181,82,58,0.06)" stroke="#b5523a" stroke-width="1.4"/>
    <circle cx="304" cy="416" r="14" fill="rgba(181,82,58,0.20)" stroke="#b5523a" stroke-width="1.4"/>
    <text x="304" y="421" fill="#b5523a" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">4</text>
    <text x="328" y="402" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif">处理响应流 ★</text>
    <text x="328" y="420" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">Provider 私有事件 → 12 种统一事件</text>
    <text x="328" y="436" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">逐 token 流式翻译、错误注入</text>
    <text x="328" y="448" fill="#a8a29e" font-size="8" font-family="'Geist', sans-serif" font-style="italic">工作量主要在这里</text>

    <line x1="480" y1="452" x2="480" y2="480" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>

    <!-- Step 5 -->
    <rect x="280" y="484" width="400" height="56" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
    <circle cx="304" cy="512" r="14" fill="rgba(181,82,58,0.10)" stroke="#b5523a" stroke-width="1"/>
    <text x="304" y="517" fill="#b5523a" font-size="11" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">5</text>
    <text x="328" y="504" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif">发送终止事件</text>
    <text x="328" y="522" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">成功 → push done；失败 → push error</text>
    <text x="328" y="534" fill="#a8a29e" font-size="8" font-family="'Geist Mono', monospace">stream.push({ type: "done" | "error" })</text>

    <!-- Right side: error path -->
    <text x="730" y="200" fill="#b5523a" font-size="9" font-family="'Geist Mono', monospace"
          letter-spacing="0.14em">ERROR PATH</text>
    <line x1="680" y1="224" x2="730" y2="224" stroke="#b5523a" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="680" y1="416" x2="730" y2="416" stroke="#b5523a" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="734" y="208" width="180" height="32" rx="4" fill="rgba(181,82,58,0.05)" stroke="rgba(181,82,58,0.40)" stroke-width="0.8"/>
    <text x="824" y="228" fill="#b5523a" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">请求翻译失败</text>
    <rect x="734" y="400" width="180" height="32" rx="4" fill="rgba(181,82,58,0.05)" stroke="rgba(181,82,58,0.40)" stroke-width="0.8"/>
    <text x="824" y="420" fill="#b5523a" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">响应解析失败</text>

    <path d="M 824 240 L 824 400" fill="none" stroke="#b5523a" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>

    <line x1="730" y1="512" x2="730" y2="512" stroke="#b5523a" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="730" y="556" fill="#b5523a" font-size="9" font-family="'Geist', sans-serif" font-style="italic">
      任何异常都不抛出，统一 push error 事件
    </text>

    <!-- Output -->
    <line x1="480" y1="540" x2="480" y2="568" stroke="#57534e" stroke-width="1" marker-end="url(#arrow)"/>
    <rect x="320" y="572" width="320" height="20" rx="4" fill="rgba(181,82,58,0.06)" stroke="#b5523a" stroke-width="1"/>
    <text x="480" y="586" fill="#b5523a" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle">AssistantMessageEventStream</text>
  </svg>
