<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>一次工具调用经过的完整上下文工程链路</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #faf7f2; --ink: #1c1917; --muted: #57534e; --soft: #a8a29e;
    --rule: rgba(28,25,23,0.10); --accent: #b5523a; --green: #2d6e3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink);
    font-family: 'Geist', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    padding: 3rem 1.5rem 2rem; line-height: 1.5; }
  .container { max-width: 1140px; margin: 0 auto; }
  .eyebrow { font-family: 'Geist Mono', monospace; font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  h1 { font-family: 'Instrument Serif', 'Source Han Serif SC', serif; font-weight: 400;
    font-size: 32px; margin-bottom: 0.5rem; letter-spacing: -0.01em; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 2rem; max-width: 64ch; }
  .frame { background: rgba(28,25,23,0.02); border: 1px solid var(--rule);
    border-radius: 8px; padding: 1.25rem; overflow-x: auto; }
  svg { display: block; max-width: 100%; height: auto; }
  .footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--rule);
    font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--soft);
    letter-spacing: 0.1em; display: flex; justify-content: space-between; }
</style>
</head>
<body>
<div class="container">
  <p class="eyebrow">PI-AGENT · 第 8 章 · END-TO-END PIPELINE</p>
  <h1>一次工具调用经过的完整上下文工程链路</h1>
  <p class="subtitle">用户问「修复 auth.ts 的 bug」开始，经过系统提示词组装 → Agent Loop → 工具执行 → 输出截断 → 进入历史 → agent_end → 压缩判定 / 分支摘要。每一层都是对「LLM 看到什么」的一次塑形。</p>

  <div class="frame">
  <svg viewBox="0 0 1080 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
      </marker>
      <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
      </marker>
      <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#2d6e3c"/>
      </marker>
    </defs>

    <rect width="1080" height="720" fill="#faf7f2"/>

    <!-- ===== Title: User input ===== -->
    <g>
      <rect x="380" y="20" width="320" height="36" rx="18" fill="#1c1917"/>
      <text x="540" y="42" fill="#faf7f2" font-size="11" font-family="'Geist', sans-serif" text-anchor="middle">用户："修复 auth.ts 的 bug"</text>
    </g>
    <line x1="540" y1="56" x2="540" y2="80" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- ===== Main vertical pipeline ===== -->
    <!-- Step 1 -->
    <g transform="translate(340, 84)">
      <rect x="0" y="0" width="400" height="56" rx="6" fill="rgba(45,110,60,0.06)" stroke="#2d6e3c" stroke-width="1.2"/>
      <text x="14" y="20" fill="#2d6e3c" font-size="10" font-family="'Geist Mono', monospace">[1] §四 · 加法 · 系统提示词组装</text>
      <text x="14" y="38" fill="#1c1917" font-size="10" font-family="'Geist', sans-serif">buildSystemPrompt()</text>
      <text x="14" y="52" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">CLAUDE.md 递归 + Skills 清单 + 工具定义 + cwd</text>
    </g>
    <line x1="540" y1="140" x2="540" y2="160" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- Step 2-3 -->
    <g transform="translate(340, 164)">
      <rect x="0" y="0" width="400" height="56" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <text x="14" y="20" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">[2] 用户消息 → context.messages（第 6 章）</text>
      <text x="14" y="38" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">[3] Agent Loop 开始（第 3 章 · 五步管道）</text>
      <text x="14" y="52" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">LLM 返回 toolCall: read("auth.ts")</text>
    </g>
    <line x1="540" y1="220" x2="540" y2="240" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- Step 5 -->
    <g transform="translate(340, 244)">
      <rect x="0" y="0" width="400" height="40" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <text x="14" y="16" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">[5] 执行工具 — read auth.ts</text>
      <text x="14" y="32" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">80KB · 3000 行</text>
    </g>
    <line x1="540" y1="284" x2="540" y2="304" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- Step 6 - highlighted (truncate) -->
    <g transform="translate(340, 308)">
      <rect x="0" y="0" width="400" height="64" rx="6" fill="rgba(181,82,58,0.06)" stroke="#b5523a" stroke-width="1.4"/>
      <text x="14" y="20" fill="#b5523a" font-size="10" font-family="'Geist Mono', monospace">[6] §三 · 减法 · 工具输出截断 ★</text>
      <text x="14" y="38" fill="#1c1917" font-size="10" font-family="'Geist', sans-serif">truncateHead · 2000 行 / 50KB · UTF-8 安全</text>
      <text x="14" y="54" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">80KB → 50KB · 末尾追加 [Full output: /tmp/...]</text>
    </g>
    <line x1="540" y1="372" x2="540" y2="392" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- Step 7 -->
    <g transform="translate(340, 396)">
      <rect x="0" y="0" width="400" height="40" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <text x="14" y="16" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">[7] toolResult → context.messages</text>
      <text x="14" y="32" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">循环：LLM 继续推理 / 调下一个工具</text>
    </g>
    <line x1="540" y1="436" x2="540" y2="456" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- Step 8 -->
    <g transform="translate(340, 460)">
      <rect x="0" y="0" width="400" height="40" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
      <text x="14" y="16" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace">[8] agent_end 事件触发（第 7 章）</text>
      <text x="14" y="32" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">一轮对话结束，进入「两轮之间」检查点</text>
    </g>
    <line x1="540" y1="500" x2="540" y2="520" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>

    <!-- Step 9 - decision diamond -->
    <g>
      <text x="540" y="540" fill="#b5523a" font-size="10" font-family="'Geist Mono', monospace" text-anchor="middle">[9] shouldCompact?</text>
      <polygon points="540,548 640,580 540,612 440,580" fill="rgba(181,82,58,0.06)" stroke="#b5523a" stroke-width="1.2"/>
      <text x="540" y="576" fill="#1c1917" font-size="10" font-family="'Geist', sans-serif" text-anchor="middle">tokens &gt;</text>
      <text x="540" y="590" fill="#1c1917" font-size="10" font-family="'Geist', sans-serif" text-anchor="middle">window − reserve?</text>

      <!-- NO branch (left) -->
      <line x1="440" y1="580" x2="280" y2="580" stroke="#57534e" stroke-width="1.2"/>
      <line x1="280" y1="580" x2="280" y2="612" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
      <g transform="translate(160, 620)">
        <rect x="0" y="0" width="240" height="56" rx="6" fill="#ffffff" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="14" y="20" fill="#57534e" font-size="10" font-family="'Geist', sans-serif">否 → 等下一轮</text>
        <text x="14" y="40" fill="#a8a29e" font-size="9" font-family="'Geist', sans-serif" font-style="italic">buildSessionContext 走当前路径</text>
      </g>

      <!-- YES branch (right) -->
      <line x1="640" y1="580" x2="800" y2="580" stroke="#b5523a" stroke-width="1.2"/>
      <line x1="800" y1="580" x2="800" y2="612" stroke="#b5523a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <g transform="translate(680, 620)">
        <rect x="0" y="0" width="240" height="56" rx="6" fill="rgba(181,82,58,0.06)" stroke="#b5523a" stroke-width="1.2"/>
        <text x="14" y="20" fill="#b5523a" font-size="10" font-family="'Geist', sans-serif">是 → 执行 Compaction</text>
        <text x="14" y="40" fill="#57534e" font-size="9" font-family="'Geist', sans-serif">findCutPoint + 摘要生成 → Session Tree</text>
      </g>
    </g>

    <!-- Side annotations -->
    <g>
      <line x1="740" y1="100" x2="780" y2="100" stroke="#a8a29e" stroke-width="0.8"/>
      <text x="788" y="104" fill="#a8a29e" font-size="9" font-family="'Geist', sans-serif">入口：context 入 LLM 前</text>

      <line x1="740" y1="340" x2="780" y2="340" stroke="#a8a29e" stroke-width="0.8"/>
      <text x="788" y="344" fill="#a8a29e" font-size="9" font-family="'Geist', sans-serif">单条裁剪</text>

      <line x1="740" y1="480" x2="780" y2="480" stroke="#a8a29e" stroke-width="0.8"/>
      <text x="788" y="484" fill="#a8a29e" font-size="9" font-family="'Geist', sans-serif">出口：历史侧触发</text>
    </g>

    <!-- Bottom annotation -->
    <text x="540" y="700" fill="#a8a29e" font-size="10" font-family="'Geist', sans-serif" font-style="italic" text-anchor="middle">
      用户切换分支 → Branch Summarization（LCA 算法）也走右侧分支——这套链路是 Pi 上下文工程的完整闭环
    </text>
  </svg>
  </div>

  <div class="footer">
    <span>PI-AGENT · 项目原理二次整理版</span>
    <span>260702 · CH08 · FULL PIPELINE</span>
  </div>
</div>
</body>
</html>
